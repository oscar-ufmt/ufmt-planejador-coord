<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFMT | Planejador Acadêmico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="main-header">
    <div class="header-container">
        <div class="brand">
            <h1>UFMT</h1>
            <span>Planejador Acadêmico</span>
        </div>

        <div class="student-info">
            <div class="input-row">
                <input type="text" id="alunoNome" placeholder="NOME DO DISCENTE" oninput="salvarInfoAdicional()">
                <input type="text" id="alunoSEI" placeholder="PROCESSO SEI" oninput="salvarInfoAdicional()">
            </div>
            <div class="academic-config">
                <div class="config-item">
                    <label>Ingresso:</label>
                    <input type="number" id="ingressoAno" value="2022" oninput="salvarInfoAdicional()">
                    <select id="ingressoSemestre" onchange="salvarInfoAdicional()">
                        <option value="1">1º Sem</option>
                        <option value="2">2º Sem</option>
                    </select>
                </div>
                <div class="config-item">
                    <label>PPC:</label>
                    <select id="ppcIngresso" onchange="salvarInfoAdicional()">
                        <option value="2014">2014</option>
                        <option value="2020">2020</option>
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <div class="config-item">
                    <label>Trancamentos:</label>
                    <input type="number" id="trancamentos" value="0" min="0" oninput="salvarInfoAdicional()">
                </div>
            </div>
        </div>

        <div class="actions">
            <button onclick="exportarExcel()" class="btn-outline">📊 Excel</button>
            <button onclick="exportarJSON()" class="btn-outline">📤 Exportar</button>
            <button onclick="document.getElementById('inputImport').click()" class="btn-outline">📥 Importar</button>
            <input type="file" id="inputImport" style="display:none" accept=".json" onchange="importarJSON(event)">
            <button onclick="limparDados()" class="btn-danger-outline">Resetar</button>
        </div>
    </div>

    <div class="tab-nav">
        <button id="btn-fluxograma" class="tab-btn active" onclick="mudarAba('fluxograma')">🗺️ Fluxograma</button>
        <button id="btn-planejador" class="tab-btn" onclick="mudarAba('planejador')">🛠️ Planejador Individual</button>
        <button id="btn-gestao" class="tab-btn" onclick="mudarAba('gestao')">📁 Gestão da Base</button>
        <button id="btn-oferta" class="tab-btn" onclick="mudarAba('oferta')">📊 Relatório de Oferta</button>
    </div>
</header>

<main class="app-layout">
    <!-- ABA 1: FLUXOGRAMA HORIZONTAL -->
    <div id="aba-fluxograma" class="tab-content">
        <div id="painelPrazos" class="painel-prazos"></div>
        <section class="secao-historico">
            <header class="section-header" style="padding: 10px 20px; display: flex; justify-content: space-between;">
                <h3>1. Fluxograma Curricular (Clique para cursar)</h3>
                <div class="filtro-box">
                    <label>Ver Oferta PPC:</label>
                    <select id="filtroPPC" onchange="renderizarTudo()">
                        <option value="20251">2025/1</option>
                        <option value="20261" selected>2026/1</option>
                    </select>
                </div>
            </header>
            <div id="checklistObrigatorias" class="kanban-container-horizontal"></div>
        </section>
    </div>

    <!-- ABA 2: PLANEJADOR VERTICAL -->
    <div id="aba-planejador" class="tab-content" style="display:none">
        <div class="planejamento-split-vertical">
            <aside class="sidebar-pendencias-sticky">
                <h3>2. Pendências</h3>
                <p id="infoFiltroOferta" style="font-size: 0.7rem; color: #0284c7; font-weight: 800; margin-bottom: 10px;"></p>
                <div id="listaDisponiveis" class="lista-vertical-cards"></div>
            </aside>
            <section class="area-grade-vertical">
                <div class="toolbar-planejamento">
                    <div class="config-item">
                        <label><b>Semestre Inicial:</b></label>
                        <select id="selectSemestreInicial"></select>
                        <button onclick="definirSemestreInicial()" class="btn-primary">Definir Início</button>
                    </div>
                    <button onclick="acrescentarProximoSemestre()" class="btn-success">➕ Acrescentar Semestre</button>
                </div>
                <div id="gradeSemestres" class="lista-semestres-empilhados"></div>
            </section>
        </div>
    </div>

    <!-- ABA 3: GESTÃO -->
    <div id="aba-gestao" class="tab-content" style="display:none; padding: 20px;">
        <section class="card-painel">
            <h3>📁 Gestão da Base de Dados</h3>
            <div class="actions-gestao">
                <input type="file" id="importBase" style="display:none" onchange="importarBaseColegiado(event)">
                <button onclick="document.getElementById('importBase').click()" class="btn-outline-dark">Carregar Base Mestre</button>
                <button onclick="salvarAlunoNaBase()" class="btn-success">Salvar Atual</button>
                <button onclick="exportarBaseColegiado()" class="btn-primary">Baixar Base</button>
            </div>
            <div id="listaAlunosColegiado" class="grid-alunos"></div>
        </section>
    </div>

    <!-- ABA 4: RELATÓRIO ESTILO EXCEL -->
    <div id="aba-oferta" class="tab-content" style="display:none; padding: 20px;">
        <section class="card-painel">
            <h3>📊 Relatório de Oferta Consolidado</h3>
            <div class="input-relatorio-box" style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center;">
                <label>Semestre:</label>
                <select id="selectSemestreRelatorio" style="padding: 10px;"></select>
                <button onclick="gerarRelatorioOferta()" class="btn-primary">Gerar Relatório</button>
            </div>
            <div id="containerRelatorioOferta"></div>
        </section>
    </div>
</main>

<script src="js/script.js"></script>
</body>
</html>
